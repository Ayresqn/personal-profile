<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link href="https://cdn.jsdelivr.net" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container my-5">
    <div class="content-card">
      <h2 class="text-center mb-4">Contact Me</h2>
      
      <form name="myForm" onsubmit="return validateForm()">
        <fieldset>
          <legend>Contact Info</legend>
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" class="form-control mb-2">

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" class="form-control mb-2">

          <label for="telephone">Telephone:</label>
          <input type="tel" id="telephone" name="telephone" class="form-control mb-2">
        </fieldset>

        <fieldset class="mt-4">
          <legend>Job Positions</legend>
          <div class="form-check">
            <input type="checkbox" id="ae" name="position" value="ae" class="form-check-input">
            <label for="ae" class="form-check-label">Account Executive</label>
          </div>
          <!-- Add other checkboxes similarly... -->
        </fieldset>

        <fieldset class="mt-4">
          <legend>Willingness to Relocate</legend>
          <input type="radio" id="relocate-yes" name="relocate" value="yes" class="form-check-input">
          <label for="relocate-yes" class="form-check-label me-3">Yes</label>
          
          <input type="radio" id="relocate-no" name="relocate" value="no" class="form-check-input">
          <label for="relocate-no" class="form-check-label">No</label>
        </fieldset>

        <div class="mt-4 text-center">
          <input type="submit" value="Submit" class="nav-link-btn btn">
          <input type="reset" value="Reset" class="btn text-muted">
        </div>
      </form>
    </div>
  </main>

  <script>
    function validateForm() {
      let user = document.forms["myForm"]["username"].value;
      if (user == "") {
        alert("Username must be filled out");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
